<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scrubbing & Calling Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --text:#e6edf3;--text-muted:#8b949e;
  --blue:#58a6ff;--green:#3fb950;--yellow:#d29922;
  --orange:#f0883e;--red:#f85149;--purple:#bc8cff;--cyan:#39c5cf;--accent:#1f6feb;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.top-header{
  background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#0d1117 100%);
  border-bottom:1px solid var(--border);padding:16px 28px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);flex-wrap:wrap;gap:10px;
}
.top-header h1{font-size:19px;font-weight:700;letter-spacing:-.3px;}
.top-header h1 span{color:var(--blue);}
.month-selector-wrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.month-selector-label{font-size:11px;color:var(--text-muted);font-weight:600;
  text-transform:uppercase;letter-spacing:.8px;}
.month-pills{display:flex;gap:6px;flex-wrap:wrap;}
.month-pill{
  background:var(--surface2);border:1px solid var(--border);border-radius:20px;
  padding:6px 14px;font-size:13px;font-weight:500;color:var(--text-muted);
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.month-pill:hover{border-color:var(--blue);color:var(--text);}
.month-pill.active{background:var(--accent);border-color:var(--blue);color:#fff;font-weight:600;}

.main{padding:22px 28px;max-width:1600px;margin:0 auto;}
.section-title{font-size:11px;font-weight:600;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--text-muted);margin-bottom:14px;}

/* KPI CARDS */
.funnel-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));
  gap:11px;margin-bottom:28px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:16px;position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s;}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--card-accent,var(--blue));}
.kpi-label{font-size:10px;color:var(--text-muted);font-weight:500;
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;}
.kpi-value{font-size:26px;font-weight:700;line-height:1;
  color:var(--card-accent,var(--text));font-family:'DM Mono',monospace;}
.kpi-sub{font-size:12px;color:var(--text-muted);margin-top:5px;}
.kpi-sub .pct{color:var(--card-accent,var(--blue));font-weight:600;}

/* FUNNEL */
.funnel-visual{background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:22px;margin-bottom:28px;}
.funnel-bar-row{display:flex;align-items:center;margin-bottom:9px;gap:10px;}
.funnel-bar-label{width:130px;font-size:12px;color:var(--text-muted);
  text-align:right;flex-shrink:0;}
.funnel-bar-wrap{flex:1;background:var(--surface2);border-radius:6px;
  height:26px;overflow:hidden;}
.funnel-bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;
  padding-left:10px;font-size:11px;font-weight:600;color:#fff;min-width:50px;
  transition:width .8s cubic-bezier(.25,.46,.45,.94);}
.funnel-bar-count{width:80px;font-size:13px;font-weight:600;
  font-family:'DM Mono',monospace;color:var(--text);flex-shrink:0;}
.funnel-bar-pct{width:68px;font-size:11px;color:var(--text-muted);flex-shrink:0;}

/* TABS */
.tabs-row{display:flex;gap:4px;margin-bottom:18px;
  border-bottom:1px solid var(--border);flex-wrap:wrap;}
.tab-btn{background:none;border:none;color:var(--text-muted);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  padding:9px 15px;cursor:pointer;border-radius:8px 8px 0 0;
  transition:all .15s;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab-btn:hover{color:var(--text);background:var(--surface2);}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);
  background:rgba(88,166,255,.07);}
.dim-panel{display:none;}
.dim-panel.active{display:block;}

/* DIM LAYOUT */
.dim-layout{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
@media(max-width:1100px){.dim-layout{grid-template-columns:1fr;}}
.chart-card{background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:18px;}
.chart-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px;}
.chart-wrap{position:relative;height:260px;}

/* KPI PILLS */
.kpi-selector{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.kpi-pill{background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;padding:4px 11px;font-size:11px;font-weight:500;
  color:var(--text-muted);cursor:pointer;transition:all .15s;}
.kpi-pill:hover{border-color:var(--blue);color:var(--text);}
.kpi-pill.active{background:var(--accent);border-color:var(--blue);color:#fff;}

/* TABLE */
.dim-table-card{background:var(--surface);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;grid-column:1/-1;}
.dim-table-header{padding:13px 18px;border-bottom:1px solid var(--border);
  font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;}
.table-scroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{background:var(--surface2);color:var(--text-muted);font-weight:600;
  font-size:10px;text-transform:uppercase;letter-spacing:.6px;
  padding:9px 12px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;}
thead th:first-child,thead th:nth-child(2),thead th:nth-child(3){text-align:left;}
tbody tr{border-bottom:1px solid rgba(48,54,61,.5);transition:background .1s;}
tbody tr:hover{background:rgba(88,166,255,.05);}
tbody td{padding:8px 12px;text-align:right;color:var(--text);
  font-family:'DM Mono',monospace;font-size:11px;white-space:nowrap;}
tbody td:first-child{text-align:left;font-family:'DM Sans',sans-serif;
  font-weight:500;max-width:180px;overflow:hidden;text-overflow:ellipsis;}
tbody td.city-col,tbody td.mgr-col{text-align:left;font-family:'DM Sans',sans-serif;
  font-size:11px;color:var(--text-muted);max-width:130px;
  overflow:hidden;text-overflow:ellipsis;}
.pct-cell{color:var(--blue);}
.red-warn{color:var(--red)!important;}

/* INSIGHTS */
.insights-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;
  margin-top:18px;grid-column:1/-1;}
.insight-card{background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:16px;}
.insight-card.strong{border-color:rgba(63,185,80,.3);}
.insight-card.weak{border-color:rgba(248,81,73,.3);}
.insight-title{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:10px;}
.insight-card.strong .insight-title{color:var(--green);}
.insight-card.weak   .insight-title{color:var(--red);}
.insight-item{font-size:12px;color:var(--text-muted);padding:5px 0;
  border-bottom:1px solid var(--border);display:flex;gap:7px;align-items:flex-start;}
.insight-item:last-child{border-bottom:none;}
</style>
</head>

const LATEST_MONTH   = "April-2026";

// verifier tab is separate (has extra city/manager columns)
const DIMS = [
  {key:'source',        label:'Source-wise',         hasTeamCols:false},
  {key:'data_city',     label:'Data City-wise',       hasTeamCols:false},
  {key:'verifier_city', label:'Verifier City-wise',   hasTeamCols:false},
  {key:'manager',       label:'Manager-wise',         hasTeamCols:false},
  {key:'data_source',   label:'Data Source-wise',     hasTeamCols:false},

];

  {key:'workable_p',    label:'Workable %',       color:'#58a6ff'},
  {key:'callable_p',    label:'Callable %',       color:'#3fb950'},
  {key:'touched_p',     label:'Touched %',        color:'#d29922'},
  {key:'connected_p',   label:'Connected %',      color:'#f0883e'},
  {key:'conv_callable', label:'Conv% (Callable)', color:'#bc8cff'},
];
const COUNT_KPI_DEFS = [
  {key:'total',    label:'Total',     color:'#58a6ff'},
  {key:'workable', label:'Workable',  color:'#3fb950'},
  {key:'callable', label:'Callable',  color:'#d29922'},
  {key:'touched',  label:'Touched',   color:'#f0883e'},
  {key:'connected',label:'Connected', color:'#bc8cff'},
  {key:'acq_c',    label:'Acquired',  color:'#39c5cf'},
];

let activeMonth = LATEST_MONTH;
let activeKPIs  = {};
let charts      = {};

function renderMonthPills() {
  document.getElementById('monthPills').innerHTML = MONTHS_LIST.map(m =>
    `<div class="month-pill ${m===activeMonth?'active':''}" onclick="switchMonth('${m}')">${m}</div>`
  ).join('');
}

function switchMonth(month) {
  if (!ALL_MONTHS_DATA[month]) return;
  activeMonth = month;
  activeKPIs  = {};
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});
  charts = {};
  renderMonthPills();
  renderDashboard();
}

function renderDashboard() {
  const DATA = ALL_MONTHS_DATA[activeMonth];
  if (!DATA) return;
  document.getElementById('currentMonthLabel').textContent =
    activeMonth + ' — Overall Pipeline KPIs';
  renderKPICards(DATA);
  renderFunnel(DATA);
  renderTabs(DATA);
}

// ── KPI CARDS  (v9: Acq Properties = count only, no conv sub) ──
function renderKPICards(DATA) {
  const o = DATA.overall;
  const cards = [
    {label:'Total Submitted', value:o.total,       sub:'',                              accent:'#58a6ff'},
    {label:'Workable',        value:o.workable,     sub:o.workable_p+'% of Total',      accent:'#3fb950'},
    {label:'Callable',        value:o.callable,     sub:o.callable_p+'% of Workable',   accent:'#d29922'},
    {label:'Touched',         value:o.touched,      sub:o.touched_p+'% of Callable',    accent:'#f0883e'},
    {label:'Connected',       value:o.connected,    sub:o.connected_p+'% of Callable',  accent:'#bc8cff'},
    {label:'Avg Attempts',    value:o.avg_attempts, sub:'per touched lead',              accent:'#39c5cf'},
    // Acq Client: show conv% on callable + conv% on connected
    {label:'Acquired Client', value:o.acq_c,
      sub:'Conv '+o.conv_callable+'% (Ca) | '+o.conv_connected+'% (Co)',  accent:'#f85149'},
    // Acq Properties: count only, no conversion
    {label:'Acq Properties',  value:o.acq_p,        sub:'',                              accent:'#ffa657'},
  ];
  document.getElementById('kpiCards').innerHTML = cards.map(c=>`
    <div class="kpi-card" style="--card-accent:${c.accent}">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value">${typeof c.value==='number'&&!Number.isInteger(c.value)?c.value.toFixed(2):c.value.toLocaleString()}</div>
      ${c.sub?`<div class="kpi-sub"><span class="pct">${c.sub}</span></div>`:''}
    </div>
  `).join('');
}

function renderFunnel(DATA) {
  const o = DATA.overall;
  function safe(n,d){return d>0?Math.round(n/d*1000)/10:0;}
  const steps=[
    {label:'Total Submitted',value:o.total,    pct:100,                       color:'#58a6ff'},
    {label:'Workable',       value:o.workable,  pct:o.workable_p,              color:'#3fb950'},
    {label:'Callable',       value:o.callable,  pct:safe(o.callable,o.total),  color:'#d29922'},
    {label:'Touched',        value:o.touched,   pct:safe(o.touched,o.total),   color:'#f0883e'},
    {label:'Connected',      value:o.connected, pct:safe(o.connected,o.total), color:'#bc8cff'},
    {label:'Acquired Client',value:o.acq_c,     pct:safe(o.acq_c,o.total),     color:'#f85149'},
  ];
  document.getElementById('funnelBars').innerHTML=steps.map(s=>`
    <div class="funnel-bar-row">
      <div class="funnel-bar-label">${s.label}</div>
      <div class="funnel-bar-wrap">
        <div class="funnel-bar-fill" style="width:${Math.max(s.pct,2)}%;background:${s.color}">
          ${s.pct.toFixed(1)}%
        </div>
      </div>
      <div class="funnel-bar-count">${s.value.toLocaleString()}</div>
      <div class="funnel-bar-pct">${s.pct.toFixed(1)}% of total</div>
    </div>
  `).join('');
}

function renderTabs(DATA) {
  const tabsRow=document.getElementById('dimTabs');
  const panelsWrap=document.getElementById('dimPanels');
  tabsRow.innerHTML=''; panelsWrap.innerHTML='';
  let firstKey=null;
  DIMS.forEach(dim=>{
    const rows=(DATA.dims&&DATA.dims[dim.key])||[];
    if(!rows.length) return;
    if(!firstKey) firstKey=dim.key;
    activeKPIs[dim.key]=activeKPIs[dim.key]||'workable_p';
    const btn=document.createElement('button');
    btn.className='tab-btn'+(firstKey===dim.key?' active':'');
    btn.textContent=dim.label; btn.dataset.dimKey=dim.key;
    btn.onclick=()=>activateTab(dim.key,DATA);
    tabsRow.appendChild(btn);
    const panel=document.createElement('div');
    panel.className='dim-panel'+(firstKey===dim.key?' active':'');
    panel.id='panel-'+dim.key;
    panel.innerHTML=buildPanel(dim,rows);
    panelsWrap.appendChild(panel);
  });
  if(firstKey) setTimeout(()=>initChartsForDim(firstKey,DATA),50);
}

function activateTab(dimKey,DATA) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.dimKey===dimKey));
  document.querySelectorAll('.dim-panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+dimKey));
  setTimeout(()=>initChartsForDim(dimKey,DATA),50);
}

// ── BUILD PANEL  (v9: verifier tab has city+manager extra cols) ──
function buildPanel(dim, rows) {
  const selector=KPI_DEFS.map(k=>
    `<span class="kpi-pill${k.key==='workable_p'?' active':''}"
      data-dim="${dim.key}" data-kpi="${k.key}"
      onclick="selectKPI('${dim.key}','${k.key}',this)">${k.label}</span>`
  ).join('');

  // Table headers differ for verifier tab
  let extraTh = '';
  if(dim.hasTeamCols) {
    extraTh = '<th>City</th><th>Manager</th>';
  }

  const tableRows = rows.map(r => {
    let extraTd = '';
    if(dim.hasTeamCols) {
      const warnCls = r.workable_p < 70 && r.total > 0 ? ' red-warn' : '';
      extraTd = `<td class="city-col${warnCls}">${r.verifier_city||''}</td>
                 <td class="mgr-col${warnCls}">${r.manager||''}</td>`;
    }
    const nameCls = dim.hasTeamCols && r.workable_p<70 && r.total>0 ? ' red-warn' : '';
    return `<tr>
      <td class="${nameCls}" title="${r.label}">${r.label}</td>
      ${extraTd}
      <td>${r.total.toLocaleString()}</td>
      <td>${r.workable.toLocaleString()}</td>
      <td class="pct-cell">${r.workable_p.toFixed(1)}%</td>
      <td>${r.callable.toLocaleString()}</td>
      <td class="pct-cell">${r.callable_p.toFixed(1)}%</td>
      <td>${r.touched.toLocaleString()}</td>
      <td class="pct-cell">${r.touched_p.toFixed(1)}%</td>
      <td>${r.connected.toLocaleString()}</td>
      <td class="pct-cell">${r.connected_p.toFixed(1)}%</td>
      <td>${r.avg_attempts.toFixed(2)}</td>
      <td>${r.acq_c.toLocaleString()}</td>
      <td>${r.acq_p.toLocaleString()}</td>
      <td class="pct-cell">${r.conv_callable.toFixed(1)}%</td>
      <td class="pct-cell">${r.conv_connected.toFixed(1)}%</td>
    </tr>`;
  }).join('');

  const dimHeaderLabel = dim.label.replace(/-wise/i,'');
  const insights=computeInsights(rows);

  return `
    <div class="dim-layout">
      <div class="chart-card">
        <div class="chart-title">% KPI Comparison</div>
        <div class="kpi-selector">${selector}</div>
        <div class="chart-wrap"><canvas id="chart-pct-${dim.key}"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Count Overview</div>
        <div class="chart-wrap"><canvas id="chart-cnt-${dim.key}"></canvas></div>
      </div>
      <div class="dim-table-card">
        <div class="dim-table-header">
          <span>${dim.label} — Full KPI Table</span>
          <span style="font-size:11px;color:var(--text-muted)">${rows.length} entries${dim.hasTeamCols?' | 🔴 = Workable% &lt; 70%':''}</span>
        </div>
        <div class="table-scroll">
          <table>
            <thead><tr>
              <th>${dimHeaderLabel}</th>
              ${extraTh}
              <th>Total</th><th>Workable</th><th>Wk%</th>
              <th>Callable</th><th>Ca%</th>
              <th>Touched</th><th>To%</th>
              <th>Connected</th><th>Co%</th>
              <th>Avg Att.</th>
              <th>Acq Client</th><th>Acq Props</th>
              <th>Conv%(Ca)</th><th>Conv%(Co)</th>
            </tr></thead>
            <tbody>${tableRows}</tbody>
          </table>
        </div>
      </div>
      <div class="insights-row">
        <div class="insight-card strong">
          <div class="insight-title">★ Strong Points</div>
          ${insights.strong.map(i=>`<div class="insight-item"><span>✅</span>${i}</div>`).join('')||'<div class="insight-item">No data</div>'}
        </div>
        <div class="insight-card weak">
          <div class="insight-title">⚠ Weak Points</div>
          ${insights.weak.map(i=>`<div class="insight-item"><span>🔴</span>${i}</div>`).join('')||'<div class="insight-item">No data</div>'}
        </div>
      </div>
    </div>
  `;
}

function computeInsights(rows) {
  const strong=[],weak=[];
  const checks=[
    {key:'workable_p',   label:'Workable %',       good:70},
    {key:'callable_p',   label:'Callable %',        good:50},
    {key:'touched_p',    label:'Touched %',         good:60},
    {key:'connected_p',  label:'Connected %',       good:40},
    {key:'conv_callable',label:'Conv% on Callable', good:5},
  ];
  checks.forEach(c=>{
    const valid=rows.filter(r=>r.total>=5);
    if(!valid.length) return;
    const sorted=[...valid].sort((a,b)=>b[c.key]-a[c.key]);
    const best=sorted[0],worst=sorted[sorted.length-1];
    if(best[c.key]>0)
      strong.push(`<b>${best.label}</b> — ${c.label}: <b>${best[c.key].toFixed(1)}%</b>`);
    if(worst[c.key]<best[c.key])
      weak.push(`<b>${worst.label}</b> — ${c.label}: <b>${worst[c.key].toFixed(1)}%</b>`);
  });
  return {strong:strong.slice(0,5),weak:weak.slice(0,5)};
}

function initChartsForDim(dimKey,DATA) {
  const rows=(DATA.dims&&DATA.dims[dimKey])||[];
  if(!rows.length) return;
  const labels=rows.map(r=>r.label.length>16?r.label.slice(0,14)+'…':r.label);
  const selKPI=activeKPIs[dimKey]||'workable_p';
  const kpiDef=KPI_DEFS.find(k=>k.key===selKPI)||KPI_DEFS[0];

  const pctId='chart-pct-'+dimKey;
  if(charts[pctId]){try{charts[pctId].destroy();}catch(e){}}
  const pctCtx=document.getElementById(pctId);
  if(pctCtx){
    charts[pctId]=new Chart(pctCtx,{
      type:'bar',
      data:{labels,datasets:[{
        label:kpiDef.label,
        data:rows.map(r=>r[selKPI]),
        backgroundColor:rows.map(r=>r[selKPI]>=50?'rgba(63,185,80,.75)':r[selKPI]>=25?'rgba(210,153,34,.75)':'rgba(248,81,73,.75)'),
        borderColor:rows.map(r=>r[selKPI]>=50?'#3fb950':r[selKPI]>=25?'#d29922':'#f85149'),
        borderWidth:1.5,borderRadius:4,
      }]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.parsed.y.toFixed(1)}%`}}},
        scales:{
          x:{ticks:{color:'#8b949e',font:{size:9},maxRotation:40},grid:{color:'rgba(48,54,61,.5)'}},
          y:{ticks:{color:'#8b949e',callback:v=>v+'%'},grid:{color:'rgba(48,54,61,.5)'},beginAtZero:true}
        }
      }
    });
  }

  const cntId='chart-cnt-'+dimKey;
  if(charts[cntId]){try{charts[cntId].destroy();}catch(e){}}
  const cntCtx=document.getElementById(cntId);
  if(cntCtx){
    charts[cntId]=new Chart(cntCtx,{
      type:'bar',
      data:{labels,datasets:COUNT_KPI_DEFS.map(k=>
        ({label:k.label,data:rows.map(r=>r[k.key]),
          backgroundColor:k.color+'99',borderColor:k.color,borderWidth:1.5,borderRadius:3})
      )},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:true,labels:{color:'#8b949e',font:{size:9},boxWidth:9}}},
        scales:{
          x:{ticks:{color:'#8b949e',font:{size:9},maxRotation:40},grid:{color:'rgba(48,54,61,.5)'}},
          y:{ticks:{color:'#8b949e'},grid:{color:'rgba(48,54,61,.5)'},beginAtZero:true}
        }
      }
    });
  }
}

function selectKPI(dimKey,kpiKey,el) {
  activeKPIs[dimKey]=kpiKey;
  document.querySelectorAll(`.kpi-pill[data-dim="${dimKey}"]`)
    .forEach(p=>p.classList.toggle('active',p.dataset.kpi===kpiKey));
  const rows=(ALL_MONTHS_DATA[activeMonth].dims&&ALL_MONTHS_DATA[activeMonth].dims[dimKey])||[];
  const kpiDef=KPI_DEFS.find(k=>k.key===kpiKey)||KPI_DEFS[0];
  const pctId='chart-pct-'+dimKey;
  if(charts[pctId]){
    charts[pctId].data.datasets[0].label=kpiDef.label;
    charts[pctId].data.datasets[0].data=rows.map(r=>r[kpiKey]);
    charts[pctId].data.datasets[0].backgroundColor=rows.map(r=>r[kpiKey]>=50?'rgba(63,185,80,.75)':r[kpiKey]>=25?'rgba(210,153,34,.75)':'rgba(248,81,73,.75)');
    charts[pctId].data.datasets[0].borderColor=rows.map(r=>r[kpiKey]>=50?'#3fb950':r[kpiKey]>=25?'#d29922':'#f85149');
    charts[pctId].update();
  }
}

renderMonthPills();
renderDashboard();
</script>
